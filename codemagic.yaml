# =====================================================================
# Codemagic — build cloud des apps mobiles Ozance (Capacitor).
# L'app native charge https://ozance.app (server.url dans capacitor.config.ts),
# donc il n'y a pas de build web à embarquer : la CI génère les projets natifs,
# les icônes/splash, puis compile et signe.
#
# ⚠️ À configurer dans l'interface Codemagic (une fois) :
#   - iOS   : intégration "App Store Connect API key" (nom repris ci-dessous)
#             + signature automatique (Codemagic gère certificats/profils).
#   - Android : "Android keystore" (upload du keystore) + credentials Google Play.
# Docs : https://docs.codemagic.io/yaml-code-signing/signing-ios/
#        https://docs.codemagic.io/yaml-code-signing/signing-android/
# =====================================================================

workflows:
  # -------------------------------------------------------------------
  # iOS → TestFlight / App Store
  # -------------------------------------------------------------------
  ios-ozance:
    name: Ozance iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Nom de l'intégration App Store Connect créée dans Codemagic (Teams → Integrations)
      app_store_connect: Ozance ASC
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.ozance"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dépendances
        script: npm ci
      - name: Ajouter la plateforme iOS
        script: '[ -d ios ] || npx cap add ios'
      - name: Générer icônes & splash
        script: npx capacitor-assets generate --ios
      - name: Synchroniser Capacitor
        script: npx cap sync ios
      - name: Déclarer l'usage de Face ID (Info.plist)
        script: |
          PLIST="ios/App/App/Info.plist"
          MSG="Ozance utilise Face ID pour proteger l acces a vos donnees."
          /usr/libexec/PlistBuddy -c "Add :NSFaceIDUsageDescription string \"$MSG\"" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSFaceIDUsageDescription \"$MSG\"" "$PLIST"
      - name: Signature (profils gérés par Codemagic)
        script: xcode-project use-profiles
      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Passer à true quand prêt pour la review App Store :
        submit_to_app_store: false

  # -------------------------------------------------------------------
  # Android → Google Play (piste interne)
  # -------------------------------------------------------------------
  android-ozance:
    name: Ozance Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      android_signing:
        # Nom du keystore uploadé dans Codemagic (Teams → Code signing identities)
        - ozance_keystore
      vars:
        PACKAGE_NAME: "app.ozance"
      node: 20
    scripts:
      - name: Installer les dépendances
        script: npm ci
      - name: Ajouter la plateforme Android
        script: '[ -d android ] || npx cap add android'
      - name: Générer icônes & splash
        script: npx capacitor-assets generate --android
      - name: Synchroniser Capacitor
        script: npx cap sync android
      - name: Compiler l'AAB (release)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        # Variable "GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" à définir dans Codemagic
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
